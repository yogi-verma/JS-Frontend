<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Title -->
    <title>
      DevCrux | Full Stack Developer | JavaScript Coding & Frontend Interview Questions
    </title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="DevCrux is a full stack JavaScript platform providing frontend interview questions, JavaScript coding problems, MERN stack tutorials, web development guides, and real-world programming solutions for developers."

    <!-- Keywords -->
    <meta
      name="keywords"
      content="full stack developer, javascript coding, javascript interview questions, frontend interview questions, mern stack, react js tutorial, node js backend, coding problems, web development, programming tutorials, devcrux"

    <meta name="author" content="DevCrux" />

    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://js-frontend-ten.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DevCrux | Full Stack & JavaScript Learning Platform" />
    <meta
      property="og:description"
      content="Master JavaScript coding, frontend interview questions, and full stack development with DevCrux."
    />

    <meta property="og:image" content="https://js-frontend-ten.vercel.app/logo.png" />

    <!-- Twitter Card -->

    <meta
      name="twitter:description"
      content="Learn JavaScript coding, frontend interview preparation, and full stack development."
    />

    <!-- Theme Color (Mobile Browser Color) -->

  </head>
